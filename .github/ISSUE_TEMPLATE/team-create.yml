name: "Team: Onboarding"
description: Onboard a new team onto the osinfra.io platform. Fill out this form and Copilot will generate the team configuration file.
title: "🚀 Team: Onboarding"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Fill out this form to onboard your team. Copilot will generate a `teams/{team-key}.tfvars` file and open a pull request. Once merged, the platform provisions your GCP folder, Google Cloud Identity groups, GitHub team, and Datadog team automatically.

        > **Reference:** [`teams/example.tfvars`](../blob/main/teams/example.tfvars) documents all fields and valid values.

        ---

  # ============================================================================
  # SECTION 1 — TEAM IDENTITY
  # ============================================================================

  - type: markdown
    attributes:
      value: |
        ## 1 — Team Identity

  - type: input
    id: team_key
    attributes:
      label: Team Key
      description: >
        The unique identifier for your team. This becomes your GCP folder name, GitHub team slug, and Datadog team handle.
        The prefix **must match** your team type — see the Team Type field below.
        Use only lowercase letters, numbers, and hyphens.

        | Team Type | Prefix | Example |
        |-----------|--------|---------|
        | Platform | `pt-` | `pt-myteam` |
        | Stream-aligned | `st-` | `st-myproduct` |
        | Complicated-subsystem | `ct-` | `ct-mysubsystem` |
        | Enabling | `et-` | `et-myenablers` |
      placeholder: pt-myteam
    validations:
      required: true

  - type: input
    id: display_name
    attributes:
      label: Display Name
      description: >
        The human-readable name for your team. This appears in the GCP console, GitHub organization,
        and Datadog. Must be **Title Case** with no special characters except spaces.
        The word "and" is allowed in lowercase (e.g., "Trust and Safety").
      placeholder: My Team
    validations:
      required: true

  - type: dropdown
    id: team_type
    attributes:
      label: Team Type
      description: >
        Your team's [Team Topologies](https://teamtopologies.com/) type. This determines which GCP folder hierarchy
        your team lives in and must match the prefix of your Team Key above.
      options:
        - "platform-team (pt-) — Provides internal platform capabilities consumed by other teams"
        - "stream-aligned-team (st-) — Aligned to a flow of work delivering value to end users"
        - "complicated-subsystem-team (ct-) — Manages a complex technical subsystem requiring specialist knowledge"
        - "enabling-team (et-) — Helps other teams adopt new practices or technologies; temporary by design"
    validations:
      required: true

  # ============================================================================
  # SECTION 2 — DATADOG TEAM MEMBERSHIPS
  # ============================================================================

  - type: markdown
    attributes:
      value: |
        ## 2 — Datadog Team Memberships

        Use **email addresses** for all Datadog fields.

  - type: textarea
    id: datadog_admins
    attributes:
      label: Datadog Admins
      description: >
        **Admins** can manage team members, settings, dashboards, monitors, and all team resources in Datadog.
        At least one admin is required. One per line.
      placeholder: |
        admin@example.com
    validations:
      required: true

  - type: textarea
    id: datadog_members
    attributes:
      label: Datadog Members
      description: >
        **Members** get read-only access to team dashboards and monitors. Good for stakeholders, auditors,
        or anyone who needs visibility without management permissions. One per line. Leave blank if none.
      placeholder: |
        member@example.com
        observer@example.com

  # ============================================================================
  # SECTION 3 — GITHUB PARENT TEAM
  # ============================================================================

  - type: markdown
    attributes:
      value: |
        ## 3 — GitHub Parent Team

        Use **GitHub usernames** for all GitHub fields.

  - type: textarea
    id: github_parent_maintainers
    attributes:
      label: GitHub Parent Team — Maintainers
      description: >
        **Maintainers** can manage team settings, add/remove members, and have admin access on all team repositories.
        These are typically team leads or platform engineers. One per line.
      placeholder: |
        github-username
        team-lead
    validations:
      required: true

  - type: textarea
    id: github_parent_members
    attributes:
      label: GitHub Parent Team — Members
      description: >
        **Members** get write access to team repositories and inherit permissions from child teams.
        These are regular contributors. One per line. Leave blank if none.
      placeholder: |
        contributor1
        contributor2

  # ============================================================================
  # SECTION 4 — GITHUB CHILD TEAMS (DEPLOYMENT APPROVERS)
  # ============================================================================

  - type: markdown
    attributes:
      value: |
        ## 4 — GitHub Child Teams (Deployment Approvers)

        These teams control who can approve deployments to each environment. Use **GitHub usernames**.

  - type: textarea
    id: sandbox_approvers_maintainers
    attributes:
      label: Sandbox Approvers — Maintainers
      description: Can approve sandbox environment deployments and manage this approval team.
      placeholder: |
        github-username
    validations:
      required: true

  - type: textarea
    id: sandbox_approvers_members
    attributes:
      label: Sandbox Approvers — Members
      description: Can approve sandbox environment deployments. Leave blank if none.
      placeholder: |
        github-username

  - type: textarea
    id: nonprod_approvers_maintainers
    attributes:
      label: Non-Production Approvers — Maintainers
      description: Can approve non-production environment deployments and manage this approval team.
      placeholder: |
        github-username
    validations:
      required: true

  - type: textarea
    id: nonprod_approvers_members
    attributes:
      label: Non-Production Approvers — Members
      description: Can approve non-production environment deployments. Leave blank if none.
      placeholder: |
        github-username

  - type: textarea
    id: prod_approvers_maintainers
    attributes:
      label: Production Approvers — Maintainers
      description: >
        Can approve **production** environment deployments and manage this approval team.
        **Recommended:** Keep this to a small set of senior/trusted engineers.
      placeholder: |
        github-username
    validations:
      required: true

  - type: textarea
    id: prod_approvers_members
    attributes:
      label: Production Approvers — Members
      description: Can approve production environment deployments. Leave blank if none.
      placeholder: |
        github-username

  - type: textarea
    id: repo_admins_maintainers
    attributes:
      label: Repository Administrators — Maintainers
      description: >
        Can manage repository settings, branch protection rules, secrets, webhooks, and environments.
        Typically the same people as team maintainers.
      placeholder: |
        github-username
    validations:
      required: true

  - type: textarea
    id: repo_admins_members
    attributes:
      label: Repository Administrators — Members
      description: Can manage repository settings. Leave blank if none.
      placeholder: |
        github-username

  # ============================================================================
  # SECTION 5 — GOOGLE CLOUD IDENTITY GROUPS
  # ============================================================================

  - type: markdown
    attributes:
      value: |
        ## 5 — Google Cloud Identity Groups

        Three groups grant IAM roles at your team's GCP folder level. Use **email addresses**.

        | Group | GCP Role |
        |-------|----------|
        | **admin** | Full control |
        | **reader** | Read-only |
        | **writer** | Create & update |

  - type: textarea
    id: gcp_admin_owners
    attributes:
      label: GCP Admin Group — Owners
      description: >
        **Full control** over team GCP resources (create, delete, manage IAM).
        These people also own and manage the Google group membership itself.
        Use email addresses, one per line.
      placeholder: |
        admin@example.com
    validations:
      required: true

  - type: textarea
    id: gcp_admin_managers
    attributes:
      label: GCP Admin Group — Managers
      description: Can manage group membership (add/remove members) but are not group owners. One per line.
      placeholder: |
        manager@example.com

  - type: textarea
    id: gcp_admin_members
    attributes:
      label: GCP Admin Group — Members
      description: Members of the admin group. One per line.
      placeholder: |
        member@example.com

  - type: textarea
    id: gcp_reader_owners
    attributes:
      label: GCP Reader Group — Owners
      description: >
        **Read-only** access to team GCP resources. Great for auditors, compliance reviewers,
        and external stakeholders who need visibility. Use email addresses, one per line.
      placeholder: |
        reader@example.com
        auditor@example.com
    validations:
      required: true

  - type: textarea
    id: gcp_reader_managers
    attributes:
      label: GCP Reader Group — Managers
      description: Can manage group membership. One per line.
      placeholder: |
        manager@example.com

  - type: textarea
    id: gcp_reader_members
    attributes:
      label: GCP Reader Group — Members
      description: Members of the reader group. One per line.
      placeholder: |
        member@example.com

  - type: textarea
    id: gcp_writer_owners
    attributes:
      label: GCP Writer Group — Owners
      description: >
        **Create and update** GCP resources but cannot delete or manage IAM.
        Ideal for application developers who need to deploy services. Use email addresses, one per line.
      placeholder: |
        writer@example.com
    validations:
      required: true

  - type: textarea
    id: gcp_writer_managers
    attributes:
      label: GCP Writer Group — Managers
      description: Can manage group membership. One per line.
      placeholder: |
        manager@example.com

  - type: textarea
    id: gcp_writer_members
    attributes:
      label: GCP Writer Group — Members
      description: Members of the writer group. One per line.
      placeholder: |
        member@example.com

  # ============================================================================
  # SECTION 6 — OPTIONAL FEATURES
  # ============================================================================

  - type: markdown
    attributes:
      value: |
        ## 6 — Optional Features

  - type: checkboxes
    id: optional_features
    attributes:
      label: Optional Features
      description: Check the features your team needs.
      options:
        - label: >
            **Enable GitHub Actions workflows** (`enable_workflows`) —
            Creates a GCP service account and configures [Workload Identity Federation](https://cloud.google.com/iam/docs/workload-identity-federation)
            so your GitHub Actions workflows can authenticate to GCP via OIDC (no long-lived credentials).
            **Required** for any team that deploys infrastructure or pushes container images to GCP.
        - label: >
            **Enable OpenTofu state management** (`enable_opentofu_state_management`) —
            Creates a GCS bucket and KMS key IAM bindings for encrypted OpenTofu state storage.
            **Requires** "Enable GitHub Actions workflows" to also be checked.
            Only needed if your team manages infrastructure with OpenTofu.

  # ============================================================================
  # SECTION 7 — GITHUB REPOSITORIES (OPTIONAL)
  # ============================================================================

  - type: markdown
    attributes:
      value: |
        ## 7 — GitHub Repositories *(optional)*

        Define the repositories your team owns. Leave blank to add later. Copy the YAML block for each repository.

  - type: textarea
    id: github_repositories
    attributes:
      label: GitHub Repositories
      description: >
        Define repositories using the YAML structure below. Copy the block for each additional repository.
        Remove any optional fields you don't need.
      value: |
        # Paste one block per repository. Remove fields you don't need.
        #
        # your-repo-name:
        #   description: "A short description of what this repo does"
        #
        #   # Optional flags (defaults shown):
        #   enable_datadog_webhook: true          # Send CI/deploy events to Datadog (recommended)
        #   enable_datadog_secrets: false         # Add DD_API_KEY/DD_APP_KEY secrets (only for instrumented services)
        #   enable_google_wif_service_account: false  # Allow GCP OIDC auth (only for infra/image repos)
        #
        #   # Environments: omit entirely for non-infra repos (libraries, docs, tools)
        #   environments:
        #     sandbox:
        #       name: "Sandbox"
        #       reviewers:
        #         teams: ["YOUR-TEAM-KEY-sandbox-approvers"]
        #     non-production:
        #       name: "Non-Production: Main"
        #       reviewers:
        #         teams: ["YOUR-TEAM-KEY-non-production-approvers"]
        #     production:
        #       name: "Production: Main"
        #       reviewers:
        #         teams: ["YOUR-TEAM-KEY-production-approvers"]
        #     # Regional environments follow the pattern: non-production-regional-us-east1-b
        #     # Add these if your workflow deploys per-region or per-zone
        #
        #   push_allowances:
        #     - "osinfra-io/YOUR-TEAM-KEY"  # Usually just your parent team
        #
        #   topics:
        #     - opentofu
        #     - google-cloud-platform

  # ============================================================================
  # SECTION 8 — GKE CLUSTERS (OPTIONAL)
  # ============================================================================

  - type: markdown
    attributes:
      value: |
        ## 8 — GKE Clusters *(optional)*

        Define GKE cluster configuration only if your team runs Kubernetes workloads.
        **Most stream-aligned teams won't need this** — Kubernetes infrastructure is typically
        owned by the Pneuma platform team.

        If you do need GKE clusters, the platform (Corpus + Pneuma) will provision:
        - Subnets in the shared VPC for your cluster nodes, pods, and services
        - GKE clusters registered to the platform fleet
        - DNS zones for your services

        **Supported zones:** `us-east1-b`, `us-east1-c`, `us-east1-d`, `us-east4-a`, `us-east4-b`, `us-east4-c`

        > ⚠️ **Subnet IP ranges must not overlap** with any other team's ranges.
        > Coordinate with the platform team before filling in IP CIDRs.

        > ⚠️ **`enable_gke_hub_host: true`** should be set for **at most one cluster across the entire platform**.
        > Check with the platform team before enabling this.

  - type: textarea
    id: gke_clusters
    attributes:
      label: GKE Cluster Configuration
      description: Leave blank if your team does not need GKE clusters.
      value: |
        # Remove this block entirely if you don't need GKE clusters.
        #
        # dns_subdomain: myteam   # Optional: defaults to team key without prefix (e.g., pt-myteam → myteam)
        #                         # Only set if you want a different subdomain than the default
        #
        # # Artifact Registry groups: only needed if you publish container images
        # artifact_registry_groups_memberships:
        #   readers:
        #     owners: ["registry-reader@example.com"]
        #     managers: []
        #     members: []
        #   writers:
        #     owners: ["registry-writer@example.com"]
        #     managers: []
        #     members: []
        #
        # locations:
        #   "us-east1-b":
        #     enable_gke_hub_host: false  # Only one cluster across the platform should be true — check first
        #     node_pools:
        #       default-pool:
        #         machine_type: e2-standard-2
        #         min_node_count: 1
        #         max_node_count: 3
        #     subnet:
        #       ip_cidr_range: "10.x.x.x/21"          # Nodes — coordinate with platform team
        #       master_ipv4_cidr_block: "10.x.x.x/28" # Control plane — must be /28
        #       pod_ip_cidr_range: "10.x.x.x/15"      # Pods — coordinate with platform team
        #       services_ip_cidr_range: "10.x.x.x/21" # Services — coordinate with platform team
        #
        #   "us-east1-c":   # Additional zone — omit enable_gke_hub_host (defaults to false)
        #     node_pools:
        #       default-pool:
        #         machine_type: e2-standard-2
        #         min_node_count: 1
        #         max_node_count: 3
        #     subnet:
        #       ip_cidr_range: "10.x.x.x/21"
        #       master_ipv4_cidr_block: "10.x.x.x/28"
        #       pod_ip_cidr_range: "10.x.x.x/15"
        #       services_ip_cidr_range: "10.x.x.x/21"

  # ============================================================================
  # SECTION 9 — GCP PROJECTS (OPTIONAL)
  # ============================================================================

  - type: markdown
    attributes:
      value: |
        ## 9 — Additional GCP Projects *(optional)*

        By default, Corpus creates standard GCP projects for your team (one per environment).
        Only fill this in if your team needs **additional** projects beyond those defaults —
        for example, a separate data platform project or an ML training project.

        Project IDs are auto-generated from the project key. List any GCP APIs that should
        be enabled in each project.

  - type: textarea
    id: gcp_projects
    attributes:
      label: Additional GCP Projects
      description: Leave blank if your team only needs the standard projects Corpus creates.
      value: |
        # Remove this block entirely if you don't need additional GCP projects.
        #
        # data-platform:
        #   services:
        #     - bigquery.googleapis.com
        #     - dataflow.googleapis.com
        #     - storage.googleapis.com
        #
        # ml-training:
        #   services:
        #     - aiplatform.googleapis.com
        #     - compute.googleapis.com

  # ============================================================================
  # SECTION 10 — CORPUS-ONLY GROUPS (pt-corpus ONLY)
  # ============================================================================

  - type: markdown
    attributes:
      value: |
        ## 10 — Corpus-only Groups

        > ⛔ **These fields are ONLY for the `pt-corpus` team. All other teams must leave this section blank.**

        These groups grant Corpus service accounts the elevated permissions they need to operate
        across all team folders on behalf of the platform:

        - **Browser groups** — Allow Corpus to browse the GCP console to discover resources across all team folders (`roles/browser`)
        - **Project Creator groups** — Allow Corpus to create GCP projects inside team folders (`roles/resourcemanager.projectCreator`)
        - **XPN Admin groups** — Allow Corpus to attach service projects to the shared VPC (`roles/compute.xpnAdmin`)

        Each group has three environments: `sandbox`, `non-production`, `production`.

  - type: textarea
    id: corpus_browser_groups
    attributes:
      label: Google Browser Groups *(pt-corpus only)*
      description: >
        Leave blank unless this is the pt-corpus team. Paste the service account emails for each environment.
      value: |
        # sandbox:
        #   owners: []
        #   managers: ["pt-corpus-github@pt-corpus-XXXX-sb.iam.gserviceaccount.com"]
        #   members: []
        # non-production:
        #   owners: []
        #   managers: ["pt-corpus-github@pt-corpus-XXXX-nonprod.iam.gserviceaccount.com"]
        #   members: []
        # production:
        #   owners: []
        #   managers: ["pt-corpus-github@pt-corpus-XXXX-prod.iam.gserviceaccount.com"]
        #   members: []

  - type: textarea
    id: corpus_project_creator_groups
    attributes:
      label: Google Project Creator Groups *(pt-corpus only)*
      description: >
        Leave blank unless this is the pt-corpus team. Paste the service account emails for each environment.
      value: |
        # sandbox:
        #   owners: []
        #   managers: ["pt-corpus-github@pt-corpus-XXXX-sb.iam.gserviceaccount.com"]
        #   members: []
        # non-production:
        #   owners: []
        #   managers: ["pt-corpus-github@pt-corpus-XXXX-nonprod.iam.gserviceaccount.com"]
        #   members: []
        # production:
        #   owners: []
        #   managers: ["pt-corpus-github@pt-corpus-XXXX-prod.iam.gserviceaccount.com"]
        #   members: []

  - type: textarea
    id: corpus_xpn_admin_groups
    attributes:
      label: Google XPN Admin Groups *(pt-corpus only)*
      description: >
        Leave blank unless this is the pt-corpus team. Paste the service account emails for each environment.
      value: |
        # sandbox:
        #   owners: []
        #   managers: ["pt-corpus-github@pt-corpus-XXXX-sb.iam.gserviceaccount.com"]
        #   members: []
        # non-production:
        #   owners: []
        #   managers: ["pt-corpus-github@pt-corpus-XXXX-nonprod.iam.gserviceaccount.com"]
        #   members: []
        # production:
        #   owners: []
        #   managers: ["pt-corpus-github@pt-corpus-XXXX-prod.iam.gserviceaccount.com"]
        #   members: []

  # ============================================================================
  # SECTION 11 — ADDITIONAL CONTEXT
  # ============================================================================

  - type: markdown
    attributes:
      value: |
        ## 11 — Additional Context *(optional)*

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: >
        Anything else the platform team should know? Special requirements, deadline, dependencies on other teams, etc.
      placeholder: "e.g., We need sandbox access by end of month for our launch. We depend on pt-corpus provisioning our VPC first."
