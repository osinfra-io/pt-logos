name: Production

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"

concurrency:
  group: production
  cancel-in-progress: false

# For reusable workflows, the permissions setting for id-token should be set to write at the
# caller workflow level or in the specific job that calls the reusable workflow.

permissions:
  contents: read
  id-token: write

jobs:
  main:
    name: "Team: ${{ matrix.team }}"
    uses: osinfra-io/pt-techne-opentofu-workflows/.github/workflows/plan-and-apply.yml@5e0e5ea22c629ef678da26c0cecf640f56c15653 # v0.3.1
    if: github.event.head_commit.author.username != 'dependabot[bot]'
    strategy:
      fail-fast: false
      matrix:
        team:
          - pt-arche
          - pt-corpus
          - pt-ekklesia
          - pt-logos
          - pt-pneuma
          - pt-techne
          - st-ethos
          - st-temp
    with:
      checkout_ref: ${{ github.ref }}
      github_environment: "Production: ${{ matrix.team }}"

      # This service account needs to be added to the Groups Admin system role in the the Google Workspace Admin Console
      service_account: pt-logos-github@pt-corpus-tf16-prod.iam.gserviceaccount.com
      opentofu_kms_encryption_key: projects/pt-corpus-tf16-prod/locations/us/keyRings/state-encryption/cryptoKeys/default
      opentofu_plan_args: -var-file=teams/${{ matrix.team }}.tfvars
      opentofu_state_bucket: pt-logos-state-prod
      opentofu_version: ${{ vars.OPENTOFU_VERSION }}
      opentofu_workspace: "${{ matrix.team }}-main-production"
      workload_identity_provider: projects/557265520053/locations/global/workloadIdentityPools/github-actions/providers/github-actions-oidc

    secrets:
      opentofu_plan_secret_args: >-
        -var=datadog_api_key=${{ secrets.DATADOG_API_KEY }}
        -var=datadog_app_key=${{ secrets.DATADOG_APP_KEY }}
        -var=github_datadog_webhook_api_key=${{ secrets.DATADOG_WEBHOOK_API_KEY }}
        -var=github_token=${{ secrets.TOKEN }}
